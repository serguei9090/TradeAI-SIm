name: Auto Merge Jules PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Explicitly grant the required permissions to the GITHUB_TOKEN
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Check for the correct Jules bot username
    if: if: contains(github.event.pull_request.body, 'PR created automatically by Jules')
    steps:
      - name: Auto-merge PR
        run: gh pr merge "${{ github.event.pull_request.html_url }}" --auto --squash
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
